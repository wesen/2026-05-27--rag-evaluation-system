name: rag-widget-xgoja-site
appName: rag-widget-xgoja-site
envPrefix: RAG_WIDGET_SITE
target:
  kind: xgoja
  output: dist/rag-widget-xgoja-site
packages:
  - id: go-go-goja-host
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/host
  - id: go-go-goja-http
    import: github.com/go-go-golems/go-go-goja/pkg/xgoja/providers/http
  - id: rag-widget-site
    import: github.com/go-go-golems/rag-evaluation-system/pkg/xgoja/providers/widgetsite
    replace: ../../..
assets:
  - id: webapp
    path: ./assets
    embed: true
    description: Tiny static app that fetches Widget IR from the generated xgoja server.
modules:
  - package: go-go-goja-http
    name: express
    as: express
  - package: go-go-goja-host
    name: fs
    as: fs:assets
    config:
      embedded:
        allow: true
        mounts:
          - asset: webapp
            mount: /app
  - package: go-go-goja-host
    name: db
    as: db
    config:
      driverName: sqlite3
      dataSourceName: ':memory:'
  - package: rag-widget-site
    name: widget.dsl
    as: widget.dsl
commands:
  jsverbs:
    enabled: true
    name: verbs
  eval:
    enabled: false
  run:
    enabled: false
  repl:
    enabled: false
commandProviders:
  - id: http-serve
    package: go-go-goja-http
    name: serve
    mount: serve
help:
  sources:
    - id: widget-dsl
      package: rag-widget-site
      source: widget-dsl
jsverbs:
  - id: local-sites
    path: ./verbs
    embed: true
